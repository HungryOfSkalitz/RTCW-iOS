name: Build Unsigned RTCW-iOS for AltStore

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Fix missing local RTCW directories
        run: |
          mkdir -p "/Users/runner/Library/Application Support/RTCW/Main"
          touch "/Users/runner/Library/Application Support/RTCW/Main/.gitkeep"
      - name: Build App Archive
        run: |
          xcodebuild archive \
            -project RTCW-SP-iOS.xcodeproj \
            -scheme "RTCW-SP-iOS" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/RTCW-SP-iOS.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package IPA Manually
        run: |
          cd $RUNNER_TEMP
          mkdir -p Payload
          
          
          APP_PATH=$(find RTCW-SP-iOS.xcarchive/Products/Applications -name "RTCW-SP-iOS.app" -type d | head -n 1)
          echo "Found app at: $APP_PATH"
          
          
          cp -R "$APP_PATH" Payload/
          
          
          zip -q -r RTCW-SP-iOS.ipa Payload -x "*.DS_Store"
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rtcw-unsigned-ipa
          path: ${{ runner.temp }}/RTCW-SP-iOS.ipa
